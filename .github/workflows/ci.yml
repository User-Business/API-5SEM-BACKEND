name: CI Backend

on:
  push:
    branches: [main, Sprint-3]
  pull_request:
    branches: [main, Sprint-3]

concurrency:
  group: ci-backend-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: true

jobs:

  # Garante que toda mensagem de commit do PR siga o padrão "Renato Adorno"
  # (<tipo>: descrição em inglês). Só roda em pull_request.
  commit-lint:
    name: Commit Lint (padrão de commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Validar mensagens de commit
        run: |
          pattern='^(feat|fix|docs|style|refactor|build|test|chore): .+'
          fail=0
          for sha in $(git rev-list ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}); do
            msg=$(git log -1 --format=%s "$sha")
            if echo "$msg" | grep -qE "$pattern"; then
              echo "OK   : $msg"
            else
              echo "::error::Commit fora do padrão: '$msg'"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "----"
            echo "Formato esperado: <tipo>: descrição em inglês (imperativo)"
            echo "Tipos válidos: feat, fix, docs, style, refactor, build, test, chore"
            echo "Exemplo: feat: add integration tests for dashboard endpoints"
            exit 1
          fi

  lint:
    name: Lint (Go Vet)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.1
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

  test:
    name: Tests + Coverage (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.1
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests with coverage
        run: |
          go test -v -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: coverage-report-backend
          path: coverage.out
          retention-days: 7

  build:
    name: Build (Go)
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v5.0.1
        with:
          go-version: '1.25'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Build application
        run: go build ./...

      - name: Verify build
        run: echo "Build completed successfully"

